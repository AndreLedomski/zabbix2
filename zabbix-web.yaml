apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
      - name: zabbix-web
        image: zabbix/zabbix-web-apache-pgsql:latest
        env:
        - name: ZBX_SERVER_HOST
          value: "zabbix-server.zabbix.svc.cluster.local"
        - name: DB_SERVER_HOST
          value: "postgres.postgres.svc.cluster.local"
        - name: POSTGRES_USER
          value: "zabbix"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web
  namespace: zabbix
spec:
  type: LoadBalancer
  selector:
    app: zabbix-web
  ports:
  - port: 80
    targetPort: 80

